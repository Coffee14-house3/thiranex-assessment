<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Container for dynamic weather particle effects (rain, snow, etc.) -->
    <div id="weather-effects"></div>

    <!-- Floating Glowing Orbs for Background Effect -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="dashboard-container">
        <h1>Weather Dashboard</h1>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name (e.g., London)...">
            <button id="search-btn">Search</button>
        </div>

        <div id="error-message" class="error-hidden"></div>

        <div id="weather-card" class="weather-hidden">
            <h2 id="location">City, Country</h2>
            <div class="weather-main">
                <span id="temperature">--°C</span>
                <span id="description">Condition</span>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <span class="label">Humidity</span>
                    <span id="humidity" class="value">--%</span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind Speed</span>
                    <span id="wind-speed" class="value">-- m/s</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
